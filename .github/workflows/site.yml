name: site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'bench/results/**'
      - '.github/workflows/site.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'bench/results/**'

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e
